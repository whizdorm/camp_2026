<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYF Camp 2026 — Advanced Admin Console</title>
    <style>
        /* --- Reset & Base Variables --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Verdana', 'Geneva', sans-serif;
        }

        body {
            background-color: #0c0c0c;
            color: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* --- Header Section --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222222;
            padding-bottom: 20px;
            margin-bottom: 30px;
            gap: 20px;
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            color: #dfd157;
            letter-spacing: -0.5px;
        }

        .brand p {
            font-size: 12px;
            color: #888888;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* --- Utility Action Buttons --- */
        .btn-ui {
            background: #1f1f1f;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 10px 16px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-ui:hover {
            background: #262626;
            border-color: #dfd157;
        }

        .btn-ui.export {
            background: #dfd157;
            color: #000000;
            border: none;
        }

        .btn-ui.export:hover {
            background: #f7e663;
        }

        .btn-ui.trash-active {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        /* --- Dashboard Analytics Counters --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: #161616;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .metric-card h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: #888888;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .metric-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
        }

        .metric-card .value.highlight { color: #dfd157; }

        /* --- Search & Bulk Action Panel --- */
        .control-panel {
            background: #161616;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-row {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .search-bar {
            flex-grow: 1;
            background: #222222;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .search-bar:focus { border-color: #dfd157; }

        .batch-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1f1f1f;
            padding: 10px 14px;
            border-radius: 8px;
            border-left: 4px solid #dfd157;
            font-size: 12px;
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .batch-bar.active {
            opacity: 1;
            pointer-events: auto;
        }

        .batch-select {
            background: #111111;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
        }

        /* --- Data Sheet Table Grid --- */
        .table-responsive {
            background: #161616;
            border: 1px solid #262626;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        th {
            background-color: #1f1f1f;
            color: #dfd157;
            font-weight: 700;
            padding: 14px 16px;
            border-bottom: 2px solid #262626;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #222222;
            color: #dddddd;
            vertical-align: middle;
        }

        tr:hover td { background-color: #1a1a1a; }

        /* Passport Thumbnail Styles */
        .passport-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .passport-thumb {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            background: #222222;
            border: 2px solid #333333;
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: zoom-in;
        }

        .passport-thumb:hover {
            transform: scale(2.2);
            border-color: #dfd157;
            z-index: 99;
            position: relative;
        }

        /* Interactive Checklist Toggles */
        .status-toggle {
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            user-select: none;
            transition: all 0.2s;
        }

        .status-toggle.yes { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
        .status-toggle.no { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            background: #262626;
            color: #cccccc;
        }
        .tag.unit { background: rgba(223, 209, 87, 0.15); color: #dfd157; }

        /* Action Buttons */
        .actions-cell {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            background: transparent;
            border: 1px solid transparent;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-action.delete { border-color: #ef4444; color: #ef4444; }
        .btn-action.delete:hover { background: #ef4444; color: #fff; }
        
        .btn-action.restore { border-color: #3b82f6; color: #3b82f6; }
        .btn-action.restore:hover { background: #3b82f6; color: #fff; }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: #888888;
            font-style: italic;
        }

        input[type="checkbox"] {
            accent-color: #dfd157;
            cursor: pointer;
            width: 15px;
            height: 15px;
        }

        /* --- Responsive Configurations --- */
        @media (max-width: 950px) {
            header { flex-direction: column; align-items: flex-start; }
            .search-row { flex-direction: column; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { border-bottom: 2px solid #262626; padding: 10px 0; }
            td { border: none; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; }
            td::before { content: attr(data-label); font-weight: 700; color: #dfd157; font-size: 11px; text-transform: uppercase; }
            .actions-cell { width: 100%; justify-content: flex-end; }
            .passport-cell { justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <div class="brand">
                <h1 id="dashboardTitle">AYF Camp 2026 Registry Management</h1>
                <p id="dashboardSubtitle">Live Administrative Database Console</p>
            </div>
            <div class="header-actions">
                <button class="btn-ui" id="toggleTrashBtn">
                    <span>📁</span> <span id="trashBtnText">Show Deleted Entries</span>
                </button>
                <button class="btn-ui export" id="exportCsvBtn">
                    <span>📥</span> Export to CSV
                </button>
            </div>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Total Displayed</h3>
                <div class="value highlight" id="metricTotal">0</div>
            </div>
            <div class="metric-card">
                <h3>Total Paid Counter</h3>
                <div class="value" id="metricPaid">0</div>
            </div>
            <div class="metric-card">
                <h3>Total Checked-In</h3>
                <div class="value" id="metricChecked">0</div>
            </div>
        </div>

        <div class="control-panel">
            <div class="search-row">
                <input type="text" id="searchBar" class="search-bar" placeholder="Filter current view by Name, Church or Archdeaconry...">
            </div>
            
            <div class="batch-bar" id="batchBar">
                <span id="batchCountText">0 items selected</span>
                <span>•</span>
                <label>Apply Action:</label>
                <select class="batch-select" id="batchActionSelect">
                    <option value="" disabled selected>Select operation</option>
                    <option value="markPaid">Mark as Paid</option>
                    <option value="markUnpaid">Mark as Unpaid</option>
                    <option value="markChecked">Mark Checked-In</option>
                    <option value="markUnchecked">Remove Checked-In</option>
                    <option value="bulkDelete">Execute Soft Delete</option>
                </select>
                <button class="btn-ui" style="padding: 5px 12px;" id="applyBatchBtn">Apply</button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;"><input type="checkbox" id="selectAllCheckbox"></th>
                        <th>Attendee Details</th>
                        <th>Church Network</th>
                        <th>Assigned Unit</th>
                        <th>Paid Status</th>
                        <th>Attendance</th>
                        <th style="text-align: right;">Registry Actions</th>
                    </tr>
                </thead>
                <tbody id="registryTableBody">
                    <tr>
                        <td colspan="7" class="empty-state">Establishing connection context framework pipeline...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh9kKfG2A3uKRmmNfRkmDVvngO4lm2zAQ",
            authDomain: "ayf-2026-camp.firebaseapp.com",
            projectId: "ayf-2026-camp",
            storageBucket: "ayf-2026-camp.firebasestorage.app",
            messagingSenderId: "604967885680",
            appId: "1:604967885680:web:e048c131e49d7f573a0db5",
            measurementId: "G-QW8VWV58Z3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Core App Memory Buffers Lifecycle State
        let allEntries = [];
        let viewTrashMode = false;
        let selectedDocumentIds = new Set();

        // Bind DOM elements handles
        const registryTableBody = document.getElementById('registryTableBody');
        const searchBar = document.getElementById('searchBar');
        const selectAllCheckbox = document.getElementById('selectAllCheckbox');
        const batchBar = document.getElementById('batchBar');
        const batchCountText = document.getElementById('batchCountText');
        const toggleTrashBtn = document.getElementById('toggleTrashBtn');
        const trashBtnText = document.getElementById('trashBtnText');
        const dashboardTitle = document.getElementById('dashboardTitle');
        const dashboardSubtitle = document.getElementById('dashboardSubtitle');
        const exportCsvBtn = document.getElementById('exportCsvBtn');

        // Dynamic metrics interface slots bindings
        const metricTotal = document.getElementById('metricTotal');
        const metricPaid = document.getElementById('metricPaid');
        const metricChecked = document.getElementById('metricChecked');

        // Stream real-time connections directly from production references collection container
        onSnapshot(collection(db, "registrations"), (snapshot) => {
            allEntries = [];
            snapshot.forEach((doc) => {
                allEntries.push({ id: doc.id, ...doc.data() });
            });
            processRenderPipeline();
        });

        // Pipeline distribution management interface framework rendering router
        function processRenderPipeline() {
            // Uncheck row master selection buffers
            selectedDocumentIds.clear();
            selectAllCheckbox.checked = false;
            updateBatchToolbarState();

            // Filter context array split based on trash state flag values
            const activeSubSet = allEntries.filter(item => viewTrashMode ? item.isDeleted === true : !item.isDeleted);
            
            // Apply immediate client string filter lookups matching query data
            const queryValue = searchBar.value.toLowerCase().trim();
            const finalDisplaySet = activeSubSet.filter(item => {
                if(!queryValue) return true;
                return (item.fullname && item.fullname.toLowerCase().includes(queryValue)) ||
                       (item.church && item.church.toLowerCase().includes(queryValue)) ||
                       (item.archdeaconry && item.archdeaconry.toLowerCase().includes(queryValue));
            });

            // Update Metrics
            metricTotal.textContent = finalDisplaySet.length;
            metricPaid.textContent = finalDisplaySet.filter(item => item.hasPaid).length;
            metricChecked.textContent = finalDisplaySet.filter(item => item.isCheckedIn).length;

            renderTableRows(finalDisplaySet);
        }

        // Generate dynamic table body nodes layout loop
        function renderTableRows(dataset) {
            registryTableBody.innerHTML = "";
            
            if (dataset.length === 0) {
                registryTableBody.innerHTML = `<tr><td colspan="7" class="empty-state">No context record components match criteria selection view specifications.</td></tr>`;
                return;
            }

            dataset.forEach(attendee => {
                const tr = document.createElement('tr');
                const targetId = attendee.id; // Persistent identifier scope binding
                
                // Set default status boolean state keys if missing inside runtime environments
                const hasPaid = !!attendee.hasPaid;
                const isCheckedIn = !!attendee.isCheckedIn;

                // Check if a base64 passport image exists; render safe placeholder if missing
                const imageSource = attendee.passportUrl || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' fill='%23555' viewBox='0 0 24 24'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";

                tr.innerHTML = `
                    <td style="text-align:center;"><input type="checkbox" class="row-selector" data-id="${targetId}"></td>
                    <td data-label="Attendee Details">
                        <div class="passport-cell">
                            <img src="${imageSource}" class="passport-thumb" alt="Passport View">
                            <div>
                                <div style="font-weight:700; color:#fff;">${attendee.fullname || '—'}</div>
                                <div style="font-size:11px; color:#888; margin-top:2px;">${attendee.phone || '—'} • ${attendee.gender || '—'} (${attendee.ageGroup || '—'})</div>
                            </div>
                        </div>
                    </td>
                    <td data-label="Church Network">
                        <div>${attendee.church || '—'}</div>
                        <div style="font-size:11px; color:#666;">${attendee.archdeaconry || '—'}</div>
                    </td>
                    <td data-label="Assigned Unit"><span class="tag unit">${attendee.unit || '—'}</span></td>
                    <td data-label="Paid Status">
                        <span class="status-toggle ${hasPaid ? 'yes' : 'no'}" data-field="hasPaid" data-id="${targetId}">
                            ${hasPaid ? '● Paid' : '○ Unpaid'}
                        </span>
                    </td>
                    <td data-label="Attendance">
                        <span class="status-toggle ${isCheckedIn ? 'yes' : 'no'}" data-field="isCheckedIn" data-id="${targetId}">
                            ${isCheckedIn ? '✓ In' : '✗ Out'}
                        </span>
                    </td>
                    <td data-label="Registry Actions" style="text-align: right;">
                        <div class="actions-cell" style="justify-content: flex-end;">
                            ${viewTrashMode ? `
                                <button class="btn-action restore" data-id="${targetId}">Restore</button>
                                <button class="btn-action delete" data-id="${targetId}" data-hard="true">Purge</button>
                            ` : `
                                <button class="btn-action delete" data-id="${targetId}" data-hard="false">Delete</button>
                            `}
                        </div>
                    </td>
                `;

                // Single Document Field Click-Toggle Listener Context Elements
                tr.querySelectorAll('.status-toggle').forEach(toggleBtn => {
                    toggleBtn.addEventListener('click', async (e) => {
                        const currentId = e.currentTarget.getAttribute('data-id');
                        const targetField = e.currentTarget.getAttribute('data-field');
                        const invertedStateValue = !attendee[targetField];
                        
                        try {
                            await updateDoc(doc(db, "registrations", currentId), { [targetField]: invertedStateValue });
                        } catch (err) {
                            alert("Failed to modify record attribute configurations. Verify database authorization parameters.");
                        }
                    });
                });

                // Context Row Registry Actions Subscriptions
                tr.querySelectorAll('.btn-action').forEach(actionBtn => {
                    actionBtn.addEventListener('click', async (e) => {
                        const currentId = e.target.getAttribute('data-id');
                        const isHardDelete = e.target.getAttribute('data-hard') === "true";

                        if (e.target.classList.contains('restore')) {
                            await updateDoc(doc(db, "registrations", currentId), { isDeleted: false });
                        } else if (isHardDelete) {
                            if(confirm("Permanently purge this item? This action is absolute and deletes records entirely from the cluster database.")) {
                                await deleteDoc(doc(db, "registrations", currentId));
                            }
                        } else {
                            await updateDoc(doc(db, "registrations", currentId), { isDeleted: true });
                        }
                    });
                });

                // Row selection listener registration elements tracking
                const rowCheckbox = tr.querySelector('.row-selector');
                rowCheckbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedDocumentIds.add(targetId);
                    } else {
                        selectedDocumentIds.delete(targetId);
                    }
                    updateBatchToolbarState();
                });

                registryTableBody.appendChild(tr);
            });
        }

        // Selection toolbar synchronization engine tracking structural parameters
        function updateBatchToolbarState() {
            const size = selectedDocumentIds.size;
            batchCountText.textContent = `${size} row elements selected`;
            if (size > 0) {
                batchBar.classList.add('active');
            } else {
                batchBar.classList.remove('active');
            }
        }

        // Master select-all tracking logic component intercept
        selectAllCheckbox.addEventListener('change', (e) => {
            const visibleSelectors = registryTableBody.querySelectorAll('.row-selector');
            selectedDocumentIds.clear();
            
            visibleSelectors.forEach(cb => {
                cb.checked = e.target.checked;
                if (e.target.checked) {
                    selectedDocumentIds.add(cb.getAttribute('data-id'));
                }
            });
            updateBatchToolbarState();
        });

        // Batch execution orchestration engine interface pipeline loops
        document.getElementById('applyBatchBtn').addEventListener('click', async () => {
            const selectAction = document.getElementById('batchActionSelect').value;
            if (!selectAction || selectedDocumentIds.size === 0) return;

            const batchProcessor = writeBatch(db);
            let payloadModifications = {};

            switch (selectAction) {
                case "markPaid": payloadModifications = { hasPaid: true }; break;
                case "markUnpaid": payloadModifications = { hasPaid: false }; break;
                case "markChecked": payloadModifications = { isCheckedIn: true }; break;
                case "markUnchecked": payloadModifications = { isCheckedIn: false }; break;
                case "bulkDelete": 
                    if(!confirm(`Apply status shift changes to choice array indices loop context of size [${selectedDocumentIds.size}]?`)) return;
                    payloadModifications = viewTrashMode ? null : { isDeleted: true };
                    break;
            }

            selectedDocumentIds.forEach(documentId => {
                const docRef = doc(db, "registrations", documentId);
                if (selectAction === "bulkDelete" && viewTrashMode) {
                    batchProcessor.delete(docRef);
                } else {
                    batchProcessor.update(docRef, payloadModifications);
                }
            });

            try {
                await batchProcessor.commit();
                alert("Batch operations updated selected records successfully.");
                selectedDocumentIds.clear();
                processRenderPipeline();
            } catch (err) {
                alert("Execution exception caught in bulk mutation transaction loops.");
            }
        });

        // View State Toggle layer panels management router
        toggleTrashBtn.addEventListener('click', () => {
            viewTrashMode = !viewTrashMode;
            if (viewTrashMode) {
                toggleTrashBtn.classList.add('trash-active');
                trashBtnText.textContent = "Show Active Register";
                dashboardTitle.textContent = "AYF Camp 2026 — Trash Recovery Bin";
                dashboardSubtitle.textContent = "Review soft-deleted entries. Restore records or permanently purge selected indices.";
            } else {
                toggleTrashBtn.classList.remove('trash-active');
                trashBtnText.textContent = "Show Deleted Entries";
                dashboardTitle.textContent = "AYF Camp 2026 Registry Management";
                dashboardSubtitle.textContent = "Live Administrative Database Console";
            }
            processRenderPipeline();
        });

        // Real-time keyword text filtering lookups mapping configurations execution path
        searchBar.addEventListener('input', processRenderPipeline);

        // Client-side CSV download serialization generation pipeline
        exportCsvBtn.addEventListener('click', () => {
            const activeSubSet = allEntries.filter(item => viewTrashMode ? item.isDeleted === true : !item.isDeleted);
            if(activeSubSet.length === 0) {
                alert("No structural registry entries available inside the current view context to compile export maps.");
                return;
            }

            const headerRowColumns = ["Full Name", "Phone", "Archdeaconry", "Church", "Age Group", "Gender", "Camp Unit", "Paid Status", "Attendance"];
            const dataRowsArray = activeSubSet.map(record => [
                `"${(record.fullname || '').replace(/"/g, '""')}"`,
                `"${record.phone || ''}"`,
                `"${record.archdeaconry || ''}"`,
                `"${(record.church || '').replace(/"/g, '""')}"`,
                `"${record.ageGroup || ''}"`,
                `"${record.gender || ''}"`,
                `"${record.unit || ''}"`,
                record.hasPaid ? "Paid" : "Unpaid",
                record.isCheckedIn ? "Checked-In" : "Absent"
            ]);

            const assembledCsvStringContent = [headerRowColumns.join(","), ...dataRowsArray.map(r => r.join(","))].join("\n");
            const compiledBlobStream = new Blob([assembledCsvStringContent], { type: 'text/csv;charset=utf-8;' });
            const temporaryFileLinkElement = document.createElement("a");
            
            const fileStreamUrlReference = URL.createObjectURL(compiledBlobStream);
            temporaryFileLinkElement.setAttribute("href", fileStreamUrlReference);
            temporaryFileLinkElement.setAttribute("download", `AYF_Camp_2026_Registry_Export_${viewTrashMode ? 'Trash' : 'Active'}.csv`);
            temporaryFileLinkElement.style.visibility = 'hidden';
            
            document.body.appendChild(temporaryFileLinkElement);
            temporaryFileLinkElement.click();
            document.body.removeChild(temporaryFileLinkElement);
        });
    </script>
</body>
</html>
